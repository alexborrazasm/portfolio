name: Deploy Portfolio and PDF CV

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one deployment happens at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Opt-in to Node 24 for the internal runner to silence warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install wait-on --save-dev

      - name: Build Astro Project
        run: npm run build

      - name: Generate PDF Resume
        run: |
          # 1. Start Astro preview server in the background and save PID
          npm run preview & 
          SERVER_PID=$!
          
          # 2. Wait for the local server to be ready
          npx wait-on http://localhost:4321/ --timeout 60000
          
          # 3. Run the PDF generator script
          node scripts/generate-pdf.mjs
          
          # 4. Gracefully kill the background process to prevent "orphan" logs
          kill $SERVER_PID

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
